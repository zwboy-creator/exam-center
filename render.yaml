# Render + Supabase：在 Render 控制台连接 Git 后可用 Blueprint 部署
# DATABASE_URL 填 Supabase「Session pool」连接串（见下方说明）
services:
  - type: web
    name: employee-handbook-exam
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
      - key: TRUST_PROXY
        value: "1"
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
